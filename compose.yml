version: '3'
services:
  proxy:
    image: caddy:2.11-alpine
    container_name: proxy
    depends_on:
      - web
      - wp
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - $PWD/proxy/Caddyfile:/etc/caddy/Caddyfile
      - proxy_data:/data
      - proxy_config:/config
    networks:
      - mopnet
  web:
    image: caddy:2.11-alpine
    container_name: web
    restart: unless-stopped
    volumes:
      - $PWD/web/Caddyfile:/etc/caddy/Caddyfile
      - $PWD/web/:/srv/
      - web_data:/data
      - web_config:/config
    networks:
      - mopnet
  wp:
    image: wpeverywhere/frankenwp:latest-php8.2
    container_name: wp
    restart: always
    ports:
      - "8100:80"
    environment:
      SERVER_NAME: ${SERVER_NAME:-:80}
      WORDPRESS_DB_HOST: ${DB_HOST:-db}
      WORDPRESS_DB_USER: ${DB_USER:-exampleuser}
      WORDPRESS_DB_PASSWORD: ${DB_PASSWORD:-examplepass}
      WORDPRESS_DB_NAME: ${DB_NAME:-exampledb}
      WORDPRESS_DEBUG: ${WP_DEBUG:-true}
      WORDPRESS_TABLE_PREFIX: ${DB_TABLE_PREFIX:-wp_}
      CACHE_LOC: ${CACHE_LOC:-/var/www/html/wp-content/cache}
      TTL: ${TTL:-80000}
      PURGE_PATH: ${PURGE_PATH:-/__cache/purge}
      PURGE_KEY: ${PURGE_KEY:-}
      BYPASS_HOME: ${BYPASS_HOME:-false}
      BYPASS_PATH_PREFIXES: ${BYPASS_PATH_PREFIXES:-/wp-admin,/wp-content,/wp-includes,/wp-json,/feed}
      CACHE_RESPONSE_CODES: ${CACHE_RESPONSE_CODES:-000}
      CADDY_GLOBAL_OPTIONS: |
        email thiago@madeofpeople.org
        frankenphp {
          php_ini upload_max_filesize 100M  # Set PHP configuration
          php_ini post_max_size 100M
        }
      WORDPRESS_CONFIG_EXTRA: |
       define('WP_SITEURL', 'https://data.madeofpeople.org');
       define('WP_HOME', 'https://data.madeofpeople.org');
    volumes:
      - ./wp-content:/var/www/html/wp-content
    depends_on:
      - db
    tty: true
    networks:
      - mopnet
  db:
    image: mariadb:latest
    restart: always
    ports:
      - ${LOCAL_DB_PORT:-3309}:3306
    environment:
      MYSQL_DATABASE: ${DB_NAME:-exampledb}
      MYSQL_USER: ${DB_USER:-exampleuser}
      MYSQL_PASSWORD: ${DB_PASSWORD:-examplepass}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-examplepass}
    volumes:
      - wpdbv:/var/lib/mysql
    networks:
      - mopnet
  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    restart: always
    ports:
      - ${LOCAL_PHPMYADMIN_PORT:-8096}:80
    environment:
      PMA_HOST: db
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-examplepass}
    depends_on:
      - db
    networks:
      - mopnet
volumes:
  wpdbv: {}
  proxy_data: {}
  proxy_config: {}
  web_data: {}
  web_config: {}
networks:
  mopnet:
    driver: bridge